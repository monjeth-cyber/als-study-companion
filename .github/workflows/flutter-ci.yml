name: Flutter CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Show Flutter
        run: flutter --version

      - name: Get dependencies (root package)
        run: |
          flutter pub get

      - name: Run tests for packages
        run: |
          set -e
          for pkg in als_study_companion als_study_companion/mobile_app als_study_companion/backend_services als_study_companion/shared_core als_study_companion/admin_web; do
            if [ -d "$pkg" ]; then
              echo "-- package: $pkg --"
              cd $pkg
              flutter pub get || true
              flutter test || true
              cd -
            fi
          done
